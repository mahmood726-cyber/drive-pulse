<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DrivePulse Dashboard Handoff</title>
  <style>
    body {
      margin: 0;
      font-family: "Bahnschrift", "Trebuchet MS", "Segoe UI", sans-serif;
      color: #17202a;
      background: linear-gradient(180deg, #f7f9fc 0%, #e8edf4 100%);
    }
    main {
      width: min(820px, calc(100% - 28px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }
    .panel {
      background: rgba(249, 251, 254, 0.94);
      border: 1px solid rgba(23, 32, 42, 0.12);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 24px 60px rgba(23, 32, 42, 0.12);
    }
    h1, h2 { margin: 0; line-height: 1.04; }
    h1 { font-size: clamp(2rem, 5vw, 3.6rem); }
    h2 { font-size: 1.2rem; margin-top: 20px; }
    p { line-height: 1.7; color: #556477; }
    .links { display: grid; gap: 12px; margin-top: 18px; }
    a {
      display: block;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(29, 78, 216, 0.08);
      color: #1d4ed8;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>DrivePulse</h1>
      <p>
        This handoff page keeps the E156 bundle compact while still linking directly to the working folder telemetry dashboard
        and the core scan snapshot.
      </p>
      <h2>Open</h2>
      <div class="links">
        <a href="../../index.html">Root dashboard</a>
        <a href="../../data-source/folder-scan.snapshot.json">Scan snapshot</a>
        <a href="../../data.json">Derived dashboard data</a>
        <a href="../../scripts/build_drive_pulse.py">Builder</a>
      </div>
    </section>
  </main>
</body>
</html>
